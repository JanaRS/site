<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Título da página</title>
  </head>
  <body>
    <header>
      <h1>Jana</h1>
      <nav>
        <ul>
          <li><a href="#sobre">Sobre mim</a></li>
          <li><a href="#projetos">Projetos</a></li>
          <li><a href="#contato">Contato</a></li>
          <li><a href="https://www.google.com/" target="_blank">Google</a></li>
          
        </ul>
      </nav>
    </header>

    <section id="sobre">
      <h2>Sobre mim</h2>
      <img
        src="https://slp-statics.astockcdn.net/static_assets/staging/22spring/free/browse-asset-collections/Card2_435177630.jpg?width=580&format=webp"
        alt="Foto aleatória"
        title="Foto perfil"
      />
      <article>
        Digitando algo sobre mim...
      </article>

      <aside>
        <h3>Habilidades</h3>
        <ul>
          <li>HTML</li>
          <li>CSS</li>
          <li>Javascript</li>
        </ul>
      </aside>
    </section>

    <section id="projetos">
      <h2>Projeto</h2>
      <article>
        <h3>Portifólio</h3>
        <p>Meus projetos desenvolvidos</p>
      </article>
    </section>
    
    <footer>
      <p>Direitos reservados</p>
      <section id="contato">
        <h2>Contato</h2>
        <p>Entre em contato conosco</p>
        
        <form action="">
          <label for="nome">Nome: </label>
          <input type="text" id="nome" name="nome" required> <br>
          
          <label for="email">E-mail: </label>
          <input type="email" id="email" name="email"> <br>
          
          <label for="telefone">Telefone: </label>
          <input type="telefone" id="telefone" name="telefone"> <br>
          
          <label for="assunto">Assunto: </label>
          <select id="assunto" name="assunto">
            <option value="orcamento">Orçamento</option>
            <option value="duvida">Dúvida</option>
            <option value="outro">Outro</option>            
          </select> <br>
          
          <label for="mensagem">Mensagem: </label>
          <textarea name="mensagem" id="mensagem" cols="30" rows="5"></textarea> <br>
          
          <input type="checkbox" name="inscricao" id="inscricao">
          <label for="inscricao">Deseja receber novidades? Fique por dentro!</label> <br>
          
          <input type="submit" value="Enviar mensagem">
        </form>
      </section>
    </footer>
  </body>
</html>
